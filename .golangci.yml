---
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - intrange
    - nilerr
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.Copy
        - (net/http.ResponseWriter).Write

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022

    gosec:
      excludes:
        - G104
        - G304
        - G401
        - G501
        - G115

    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

  exclusions:
    generated: lax
    presets:
      - comments

formatters:
  enable:
    - gofmt

output:
  sort-results: true
  sort-order:
    - file
