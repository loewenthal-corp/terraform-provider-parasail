# GoReleaser configuration for publishing to the Terraform Registry.
# See https://goreleaser.com and
# https://developer.hashicorp.com/terraform/registry/providers/publishing
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
      - "-X github.com/loewenthal-corp/terraform-provider-parasail/internal/buildinfo.Version={{ .Version }}"
      - "-X github.com/loewenthal-corp/terraform-provider-parasail/internal/buildinfo.Commit={{ .FullCommit }}"
      - "-X github.com/loewenthal-corp/terraform-provider-parasail/internal/buildinfo.BuildTime={{ .Date }}"
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    main: .
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT is provided by crazy-max/ghaction-import-gpg in CI.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  # release-please already creates the GitHub release; attach artifacts to it.
  mode: append

changelog:
  disable: true
